<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolt Delivery • Lightning Fast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        #map { height: 420px; border-radius: 16px; }
        .bolt-yellow { color: #facc15; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200">
    <nav class="border-b border-zinc-800 bg-zinc-950 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-yellow-400 rounded-xl flex items-center justify-center text-zinc-950 font-bold text-2xl">B</div>
                <h1 class="text-3xl font-bold tracking-tighter">bolt</h1>
            </div>
            <div class="hidden md:flex gap-x-8 text-sm font-medium">
                <a href="#" onclick="showSection('home')" class="hover:text-white transition">Home</a>
                <a href="#" onclick="showTracking()" class="hover:text-white transition">Track</a>
                <a href="#" class="hover:text-white transition">Services</a>
            </div>
            <button onclick="openAdmin()" 
                    class="bg-white text-zinc-900 px-6 py-2.5 rounded-2xl font-semibold flex items-center gap-x-2 hover:bg-yellow-400 transition">
                <i class="fa-solid fa-shield-halved"></i>
                Staff Portal
            </button>
        </div>
    </nav>

    <!-- HERO -->
    <header class="bg-gradient-to-br from-zinc-900 to-black py-24">
        <div class="max-w-4xl mx-auto text-center px-6">
            <h2 class="text-6xl md:text-7xl font-bold tracking-tighter mb-4">Lightning Fast.<br>Reliable Delivery.</h2>
            <p class="text-xl text-zinc-400 mb-10">Real-time tracking across Cameroon and beyond</p>
            
            <div class="max-w-md mx-auto">
                <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-2 flex">
                    <input id="quick-track" type="text" placeholder="Enter tracking number (e.g. BD-748291)" 
                           class="bg-transparent flex-1 px-6 outline-none text-lg">
                    <button onclick="quickTrack()" 
                            class="bg-yellow-400 hover:bg-yellow-300 text-zinc-950 px-10 py-4 rounded-2xl font-semibold">TRACK</button>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-12">
        <div id="tracking-result" class="hidden bg-zinc-900 rounded-3xl p-8 border border-zinc-700"></div>
    </div>

    <!-- TRACKING MODAL -->
    <div id="tracking-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
        <div class="bg-zinc-900 w-full max-w-4xl mx-4 rounded-3xl overflow-hidden">
            <div class="p-6 border-b border-zinc-700 flex justify-between">
                <h3 class="text-2xl font-semibold" id="modal-tracking-id"></h3>
                <button onclick="closeModal()" class="text-3xl leading-none">×</button>
            </div>
            <div class="p-8">
                <div id="modal-map" class="mb-8"></div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <h4 class="font-medium mb-4 flex items-center gap-2"><i class="fa-solid fa-list-check"></i> Delivery Timeline</h4>
                        <div id="timeline" class="space-y-6"></div>
                    </div>
                    <div>
                        <button onclick="simulateMovement()" 
                                class="w-full bg-emerald-500 hover:bg-emerald-600 py-4 rounded-2xl font-semibold mb-4">
                            Simulate Live Movement →
                        </button>
                        <div id="package-info" class="bg-zinc-800 rounded-2xl p-6"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ADMIN MODAL -->
    <div id="admin-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100]">
        <div class="bg-zinc-900 w-full max-w-2xl rounded-3xl p-8">
            <h2 class="text-2xl font-bold mb-6">Staff Portal</h2>
            <div id="admin-content">
                <!-- populated by JS -->
            </div>
        </div>
    </div>

    <script>
        let packages = [];
        let currentTrackingId = null;
        let currentMap = null;

        const samplePackages = [
            { trackingId: "BD-748291", status: "In Transit", progress: 68, from: "Bamenda Market", to: "Douala Port", currentLat: 5.45, currentLng: 9.95, eta: "Tomorrow 14:30",
              history: [{time: "Today 08:15", event: "Picked up in Bamenda"}, {time: "Today 11:40", event: "Departed sorting hub"}, {time: "Today 14:20", event: "In transit on N6 highway"}] },
            { trackingId: "BD-392847", status: "Out for Delivery", progress: 92, from: "Yaoundé Central", to: "Buea", currentLat: 4.15, currentLng: 9.70, eta: "Today 18:00",
              history: [{time: "Yesterday", event: "Arrived in Douala"}, {time: "Today 09:00", event: "Departed for Buea"}] },
            { trackingId: "BD-119384", status: "Processing", progress: 25, from: "Bamenda", to: "Yaoundé", currentLat: 5.96, currentLng: 10.15, eta: "2 days",
              history: [{time: "Just now", event: "Order placed"}] }
        ];

        function initData() {
            if (!localStorage.getItem('boltPackages')) {
                packages = [...samplePackages];
                saveData();
            } else {
                packages = JSON.parse(localStorage.getItem('boltPackages'));
            }
        }

        function saveData() {
            localStorage.setItem('boltPackages', JSON.stringify(packages));
        }

        function generateTrackingCode() {
            const num = Math.floor(100000 + Math.random() * 900000);
            return `BD-${num}`;
        }

        function findPackage(id) {
            return packages.find(p => p.trackingId.toUpperCase() === id.toUpperCase());
        }

        function showTrackingModal(pkg) {
            currentTrackingId = pkg.trackingId;
            document.getElementById('tracking-modal').classList.remove('hidden');
            document.getElementById('modal-tracking-id').textContent = pkg.trackingId;

            document.getElementById('package-info').innerHTML = `
                <p class="text-emerald-400 font-medium">${pkg.status}</p>
                <p class="text-3xl font-bold mt-1">${pkg.progress}%</p>
                <p class="text-zinc-400 text-sm">ETA: ${pkg.eta}</p>
                <p class="mt-6"><strong>From:</strong> ${pkg.from}</p>
                <p><strong>To:</strong> ${pkg.to}</p>
            `;

            let html = '';
            pkg.history.forEach(item => {
                html += `<div class="flex gap-4"><div class="w-2 h-2 mt-2 bg-yellow-400 rounded-full"></div><div><p class="text-xs text-zinc-500">\( {item.time}</p><p class="font-medium"> \){item.event}</p></div></div>`;
            });
            document.getElementById('timeline').innerHTML = html;

            if (currentMap) currentMap.remove();
            currentMap = L.map('modal-map').setView([pkg.currentLat, pkg.currentLng], 10);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(currentMap);
            L.marker([pkg.currentLat, pkg.currentLng]).addTo(currentMap)
                .bindPopup('<b>Current Location</b><br>Bolt Delivery Vehicle').openPopup();
        }

        function simulateMovement() {
            const pkg = findPackage(currentTrackingId);
            if (!pkg) return;
            pkg.currentLat -= 0.08;
            pkg.currentLng -= 0.05;
            pkg.progress = Math.min(100, pkg.progress + 12);
            if (pkg.progress > 85) pkg.status = "Out for Delivery";
            if (pkg.progress >= 100) pkg.status = "Delivered";
            pkg.history.unshift({time: "Just now", event: "Vehicle updated position"});
            saveData();
            showTrackingModal(pkg);
            alert("Live update simulated! The package has moved.");
        }

        function quickTrack() {
            const input = document.getElementById('quick-track').value.trim();
            if (!input) return alert("Enter a tracking number");
            const pkg = findPackage(input);
            if (pkg) showTrackingModal(pkg);
            else alert("Tracking number not found.\nTry: BD-748291 or BD-392847");
        }

        function openAdmin() {
            const pass = prompt("Enter Staff Password (boltadmin):");
            if (pass !== "boltadmin") return alert("Incorrect password");
            const modal = document.getElementById('admin-modal');
            modal.classList.remove('hidden');
            let html = `<div class="space-y-8"><div><h3 class="font-semibold mb-4">Generate New Shipment</h3><button onclick="createNewShipment()" class="bg-yellow-400 text-zinc-950 px-8 py-3 rounded-2xl font-bold w-full">+ Generate New Tracking Code</button></div><div><h3 class="font-semibold mb-3">All Shipments</h3><div id="admin-list" class="space-y-3 max-h-96 overflow-auto"></div></div></div>`;
            document.getElementById('admin-content').innerHTML = html;
            renderAdminList();
        }

        function createNewShipment() {
            const newId = generateTrackingCode();
            const newPkg = { trackingId: newId, status: "Processing", progress: 10, from: "Bamenda", to: "Douala", currentLat: 5.96, currentLng: 10.15, eta: "3 days", history: [{time: "Just now", event: "Shipment created"}] };
            packages.push(newPkg);
            saveData();
            alert(`New tracking code created: ${newId}\nGive this to your customer!`);
            renderAdminList();
        }

        function renderAdminList() {
            let html = '';
            packages.forEach((pkg, index) => {
                html += `<div class="bg-zinc-800 p-4 rounded-2xl flex justify-between items-center"><div><strong>\( {pkg.trackingId}</strong><br><span class="text-sm text-zinc-400"> \){pkg.status} — \( {pkg.progress}%</span></div><button onclick="editPackage( \){index})" class="text-yellow-400 text-sm font-medium">Update</button></div>`;
            });
            const listEl = document.getElementById('admin-list');
            if (listEl) listEl.innerHTML = html;
        }

        function editPackage(index) {
            const pkg = packages[index];
            const newProgress = prompt("New progress % (0-100):", pkg.progress);
            if (newProgress) {
                pkg.progress = parseInt(newProgress);
                if (pkg.progress >= 100) pkg.status = "Delivered";
                else if (pkg.progress > 75) pkg.status = "Out for Delivery";
                else if (pkg.progress > 30) pkg.status = "In Transit";
                saveData();
                renderAdminList();
                alert("Package updated!");
            }
        }

        function closeModal() {
            document.getElementById('tracking-modal').classList.add('hidden');
            document.getElementById('admin-modal').classList.add('hidden');
            if (currentMap) { currentMap.remove(); currentMap = null; }
        }

        window.onload = function() {
            initData();
            console.log('%cBolt Delivery ready - built by the 4-agent team', 'color: #facc15; font-weight: bold');
        };

        window.quickTrack = quickTrack;
        window.simulateMovement = simulateMovement;
        window.openAdmin = openAdmin;
        window.closeModal = closeModal;
        window.createNewShipment = createNewShipment;
        window.editPackage = editPackage;
    </script>
</body>
  </html>
